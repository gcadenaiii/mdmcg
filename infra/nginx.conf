# Nginx reverse proxy for RPM backend
# Place this file at /etc/nginx/sites-available/rpm and symlink to sites-enabled.
# Uses Let's Encrypt certbot for TLS.
#
# Setup:
#   sudo apt install nginx certbot python3-certbot-nginx
#   sudo certbot --nginx -d mdmcg.com -d www.mdmcg.com
#   sudo systemctl reload nginx

# Required for WebSocket proxying (add to /etc/nginx/nginx.conf http block,
# or include this whole file inside an http {} block that already has it).
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name mdmcg.com www.mdmcg.com;

    # Redirect HTTP → HTTPS (certbot will add this)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name mdmcg.com www.mdmcg.com;

    # TLS certificates (managed by certbot)
    ssl_certificate     /etc/letsencrypt/live/mdmcg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mdmcg.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Live sensor WebSocket stream
    location /platform/ws/ {
        proxy_pass http://127.0.0.1:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # FastAPI backend — JSON API, device endpoints, admin HTML, health
    # Regex matches before the /platform/ prefix below, so React SPA
    # handles all other /platform/* routes (dashboard, gateway detail, etc.)
    location ~ ^/platform/(api|upload|heartbeat|gateways|patients|health|admin) {
        rewrite ^/platform/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 10M;
    }

    # Platform SPA — all other /platform/* requests serve the React app
    location /platform/ {
        root /var/www/mdmcg;
        try_files $uri /index.html;
    }

    # Marketing website (React SPA — must be last)
    location / {
        root /var/www/mdmcg;
        try_files $uri $uri/ /index.html;
    }
}
